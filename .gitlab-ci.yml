stages:
  - docker_build
  - check
  - flutter
  - build
  - deploy
  - release

# --- Release cadence model (mirrors swt-flutter) ---
# Push to main  → ONLY mark_release_needed runs (sets NEED_RELEASE=true).
#                 The release chain is available behind the manual release_gate button.
# Daily schedule → pipeline created ONLY when NEED_RELEASE == "true"; full chain runs automatically.
# Merge requests → release_gate is absent; flutter + build jobs run normally.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NEED_RELEASE == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        MARK_PIPELINE: "true"

include:
  - '/.ci/shared-templates.yml'

variables:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.console=plain
    -Dorg.gradle.vfs.watch=false
  FLUTTER_SDK: "3.35.7"
  FLUTTER_IMAGE_TAG: $CI_REGISTRY_IMAGE/jdk22.flutter:linux
  # --- EWT ↔ Evolve integration (ewt-evolve jar) ---
  # The combined bundle merges Evolve's Dart (swtflutter) with EWT's into ONE snapshot, so the
  # ewt-evolve jar is tied to a SPECIFIC swt-evolve version: the consumer must run that same
  # swt-evolve jar at runtime. We PIN to a swt-evolve GitHub release tag so every pipeline bakes
  # the identical Evolve Dart (reproducible). Bump deliberately when adopting a newer release —
  # verify the tag builds at FLUTTER_SDK above. The release tags live on GitHub (equodev/swt-evolve),
  # NOT the GitLab dev repo (which carries different versioning), so CI clones GitHub below.
  EVOLVE_REF: "v0.312.0"
  # Public GitHub repo that publishes swt-evolve releases — cloned anonymously over HTTPS (no
  # token, no allowlist). Also a full source mirror (flutter-lib + swt_native), so it builds.
  EVOLVE_PROJECT_PATH: "equodev/swt-evolve"

build_docker_image:
  stage: docker_build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_IMAGE'
    # Rebuild the image inside MRs that change the Dockerfile OR the Flutter
    # version (FLUTTER_SDK lives in this file and is baked into the image at build
    # time), so the MR validates the image (and bootstraps a new tag) instead of
    # failing to pull a tag that only main would ever build — or silently running
    # on a stale Flutter version.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths:
          - .docker/Dockerfile
          - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        paths:
          - .docker/Dockerfile
          - .gitlab-ci.yml
        compare_to: $CI_COMMIT_SHA^
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --pull --build-arg FLUTTER_VERSION=$FLUTTER_SDK -f .docker/Dockerfile -t "$FLUTTER_IMAGE_TAG" .
    - docker push "$FLUTTER_IMAGE_TAG"

# Runs on every push to main. Records that a release is pending so the next
# scheduled run triggers the full release chain.
mark_release_needed:
  stage: check
  image: alpine/curl:latest
  needs: []
  variables:
    GIT_STRATEGY: none
  script:
    - 'curl -sf --request PUT --header "PRIVATE-TOKEN: $GITLAB_PRIVATE_TOKEN"
       "$CI_API_V4_URL/projects/${CI_PROJECT_ID}/variables/NEED_RELEASE"
       --form "value=true"'
  rules:
    - if: '$MARK_PIPELINE == "true"'

# Manual button on master pipelines. Clicking it unblocks the flutter/build chain
# so the full release runs in THIS pipeline instead of waiting for the next schedule.
# On scheduled release pipelines this job is absent and the chain runs automatically.
release_gate:
  stage: check
  image: alpine:latest
  needs: []
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Release gate opened — running the release chain in this pipeline."
  rules:
    - if: '$MARK_PIPELINE == "true"'
      when: manual
      allow_failure: true

flutter:linux:
  stage: flutter
  image: $FLUTTER_IMAGE_TAG
  needs:
    - job: build_docker_image
      optional: true
    - job: release_gate
      optional: true
  script:
    - rm -rf widgets/example/build/linux
    - cd widgets/example && flutter pub get && flutter build linux --release
  artifacts:
    paths:
      - widgets/example/build/linux/
    expire_in: 1 week

flutter:macos:
  extends: .flutter:macos
  stage: flutter
  needs:
    - job: release_gate
      optional: true
  script:
    - rm -rf widgets/example/build/macos
    - cd widgets/example && flutter pub get && flutter build macos --release --no-tree-shake-icons
  artifacts:
    paths:
      - widgets/example/build/macos/
    expire_in: 1 week

flutter:windows:
  extends: .flutter:windows
  stage: flutter
  needs:
    - job: release_gate
      optional: true
  script:
    - rm -rf widgets/example/build/windows
    - cd widgets/example
    - powershell.exe -C "\$env:PATH='c:\\flutter\\bin;' + \$env:PATH; flutter pub get; flutter build windows --release"
  artifacts:
    paths:
      - widgets/example/build/windows/
    expire_in: 1 week

# =============================================================================
# BUILD STAGE
# =============================================================================

# ewt.api is JVM bytecode — cross-platform by nature. We compile once on Linux,
# bundling the flutter artifacts from all three platforms into their respective JARs.
ewt_build:
  stage: build
  image: $FLUTTER_IMAGE_TAG
  needs:
    - flutter:linux
    - flutter:macos
    - flutter:windows
    - job: build_docker_image
      optional: true
    - job: release_gate
      optional: true
  script:
    - ./gradlew :ewt.api:build -Pclassifier=linux -DskipFlutterBuild -DskipNativeTests --no-daemon
    - ./gradlew :ewt.api:build -Pclassifier=macos -DskipFlutterBuild -DskipNativeTests --no-daemon
    - ./gradlew :ewt.api:build -Pclassifier=windows -DskipFlutterBuild -DskipNativeTests --no-daemon
    - ./gradlew generateVersionEnv --no-daemon
  artifacts:
    paths:
      - ewt.api/build/libs/ewt.api-*-linux.jar
      - ewt.api/build/libs/ewt.api-*-macos.jar
      - ewt.api/build/libs/ewt.api-*-windows.jar
      - build/published/version.env
    reports:
      dotenv: build/published/version.env
    expire_in: 1 week

# Builds the self-contained ewt-evolve jar (EWT toolkit + EwtWidget + SPI provider + the
# combined Evolve/EWT Dart bundle). Needs the sibling swt-evolve at the PINNED EVOLVE_REF:
# its flutter-lib (Dart, merged into libapp.so) and its full jar (compiled against + shipped
# to the consumer). Also builds the standalone ewt.api jar + compiles the examples so the
# smoke job can run the packaged app from artifacts alone (no clone, no gradle).
ewt_evolve_build:
  stage: build
  image: $FLUTTER_IMAGE_TAG
  needs:
    - job: build_docker_image
      optional: true
    - job: release_gate
      optional: true
  # On MRs this is an opt-in manual button (non-blocking) — the integration is heavy and rarely
  # what an MR touches. On main it follows the release_gate button (manual after merge, like
  # ewt_build); on the scheduled release pipeline (NEED_RELEASE) it runs automatically.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - when: on_success
  script:
    - test -n "$EVOLVE_REF" || (echo "EVOLVE_REF must be set (pin a tag/SHA)"; exit 1)
    # Clone swt-evolve as a clean sibling (../swt-evolve, same parent as this repo). CI is not
    # bound to the local ../../swt-evolve convention: it points both build sides at the clone
    # explicitly — gradle via -PevolveHome, and the Dart via a generated pubspec_overrides.yaml
    # (so the committed evolve-app/pubspec.yaml keeps its local-friendly default untouched).
    - EVOLVE_URL="https://github.com/${EVOLVE_PROJECT_PATH}.git"
    # Fetch tags so a tag EVOLVE_REF resolves; two-step (clone + checkout) also supports a SHA.
    - git clone --filter=blob:none "$EVOLVE_URL" ../swt-evolve
    - git -C ../swt-evolve checkout "$EVOLVE_REF"
    - EVOLVE_ABS="$(cd ../swt-evolve && pwd)"
    # Point the evolve-app Dart at the clone without touching the committed pubspec.yaml.
    - >-
      printf 'dependency_overrides:\n  swtflutter:\n    path: %s/flutter-lib\n'
      "$EVOLVE_ABS" > evolve-app/pubspec_overrides.yaml
    # Build the FULL swt-evolve jar (with its native bridge/engine — NOT -DskipFlutterLib).
    - (cd ../swt-evolve && ./gradlew :swt_native:linux-x86_64Jar --no-daemon)
    # Build the standalone ewt.api jar (so the examples compile via -PuseLocal), the
    # self-contained ewt-evolve jar, and the example classes used by the smoke job.
    - ./gradlew :ewt.api:jar :ewt.api:ewtEvolveJar :examples:compileJava -PuseLocal=true -PevolveHome=../swt-evolve --no-daemon
    # Stage the swt-evolve jar next to the ewt-evolve jar so both travel as artifacts.
    - cp ../swt-evolve/swt_native/build/libs/swt_evolve-linux-x86_64.jar ewt.api/build/libs/
  artifacts:
    paths:
      - ewt.api/build/libs/ewt-evolve-*.jar
      - ewt.api/build/libs/swt_evolve-linux-x86_64.jar
      - examples/build/classes/java/main/
    expire_in: 1 week

# Headless smoke of the PRODUCTION 2-jar path: only ewt-evolve + swt-evolve on the classpath,
# no dev.equo.ewt.bundleDir, no Flutter, no clone — the SPI extracts the bundle from the jar.
# Catches silent same-surface drift (a mismatched Evolve version renders nothing, not an error).
# This is a hard gate: publish_ewt_evolve needs it, so a broken integration jar never reaches
# Maven. If the runner's headless GTK/xvfb turns out flaky, revert to allow_failure until fixed.
ewt_evolve_smoke:
  stage: build
  image: $FLUTTER_IMAGE_TAG
  needs:
    - ewt_evolve_build
  script:
    - command -v xvfb-run >/dev/null || (apt-get update && apt-get install -y xvfb) || true
    - rm -rf "$HOME/.equo/ewt"
    - EWT_EVOLVE_JAR=$(ls ewt.api/build/libs/ewt-evolve-*.jar | head -n1)
    - CP="examples/build/classes/java/main:ewt.api/build/libs/swt_evolve-linux-x86_64.jar:${EWT_EVOLVE_JAR}"
    # timeout closes the window → a non-zero exit here is expected; assert on the log instead.
    - >-
      xvfb-run -a timeout 60 java --enable-native-access=ALL-UNNAMED
      -Ddev.equo.swt.mode=desktop -Ddev.equo.swt.crashReport.disabled=true
      -cp "$CP" dev.equo.EvolveEwtButtons > smoke.log 2>&1 || true
    - tail -n 30 smoke.log || true
    - 'grep -q "external app bundle base" smoke.log || { echo "SMOKE FAILED - SPI bundle base line missing"; exit 1; }'
    - >-
      grep -qE "Resource not found|No builder|Invalid ELF|SIGSEGV|ExceptionInInit|combined libwidgets not found|FATAL:|Check failed:|Aborted" smoke.log
      && { echo "SMOKE FAILED - crash marker in log"; exit 1; } || true
    - 'echo "SMOKE OK - bundle discovered via SPI, no crash markers."'
  artifacts:
    when: always
    paths:
      - smoke.log
    expire_in: 1 week

# =============================================================================
# DEPLOY STAGE
# =============================================================================

publish_to_mvn:
  stage: deploy
  image: $FLUTTER_IMAGE_TAG
  needs:
    - ewt_build
  script:
    - ./gradlew :ewt.api:publishAllPlatforms --no-daemon
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NEED_RELEASE == "true"'

# Publishes dev.equo:ewt-evolve from the jar built by ewt_evolve_build (no rebuild). The
# publication is registered only when the swt-evolve jar is present, so restore it to the
# sibling path first to satisfy the evolveAvailable gate at configuration time; the file-based
# artifact then uploads the restored ewt-evolve jar without re-running the bundle merge.
publish_ewt_evolve:
  stage: deploy
  image: $FLUTTER_IMAGE_TAG
  needs:
    - ewt_evolve_build
    - ewt_evolve_smoke
  script:
    - mkdir -p ../swt-evolve/swt_native/build/libs
    - cp ewt.api/build/libs/swt_evolve-linux-x86_64.jar ../swt-evolve/swt_native/build/libs/
    - ./gradlew :ewt.api:publishEwtEvolvePublicationToGitlabRepository -PevolveHome=../swt-evolve --no-daemon
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NEED_RELEASE == "true"'

upload_to_gcs:
  extends: .gcs_upload
  stage: deploy
  needs:
    - ewt_build
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NEED_RELEASE == "true"'

# =============================================================================
# RELEASE STAGE
# =============================================================================

github_release:
  stage: release
  image:
    name: maniator/gh:latest
    entrypoint: [""]
  variables:
    GITHUB_TOKEN: $GITHUB_TOKEN
    GIT_STRATEGY: none
  needs:
    - publish_to_mvn
    - job: upload_to_gcs
      artifacts: false
    - ewt_build
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Releasing v$RELEASE_NEXT"
    - gh release create "v$RELEASE_NEXT"
        --target main
        --generate-notes
        --repo equodev/ewt
        ewt.api/build/libs/ewt.api-*-linux.jar
        ewt.api/build/libs/ewt.api-*-macos.jar
        ewt.api/build/libs/ewt.api-*-windows.jar
    - echo "Release published — clearing NEED_RELEASE"
    - 'curl -sf --request PUT --header "PRIVATE-TOKEN: $GITLAB_PRIVATE_TOKEN"
       "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/NEED_RELEASE"
       --form "value=false"'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: delayed
      start_in: 5 minutes
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NEED_RELEASE == "true"'
      when: delayed
      start_in: 5 minutes

# Increments the patch version in gradle.properties after a successful release
# so the next cycle doesn't try to release the same version again.
# Uses the GitLab Files API with [skip ci] to avoid triggering another pipeline.
bump_version:
  stage: release
  image: alpine:latest
  needs:
    - job: github_release
      artifacts: false
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache curl
  script:
    - |
      CURRENT=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_PRIVATE_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/files/gradle.properties/raw?ref=$CI_DEFAULT_BRANCH")
      CURRENT_VERSION=$(echo "$CURRENT" | grep '^version=' | cut -d= -f2)
      MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
      MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
      PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
      NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
      NEW_CONTENT=$(echo "$CURRENT" | sed "s/^version=.*/version=$NEW_VERSION/")
      ENCODED=$(printf '%s' "$NEW_CONTENT" | base64 -w 0)
      curl -sf --request PUT \
        --header "PRIVATE-TOKEN: $GITLAB_PRIVATE_TOKEN" \
        --header "Content-Type: application/json" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/files/gradle.properties" \
        --data "{\"branch\":\"$CI_DEFAULT_BRANCH\",\"content\":\"$ENCODED\",\"encoding\":\"base64\",\"commit_message\":\"chore: bump version to $NEW_VERSION [skip ci]\"}"
      echo "Bumped $CURRENT_VERSION → $NEW_VERSION"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NEED_RELEASE == "true"'

